version: "3.8"

services:
  neo4j:
    image: neo4j:5.18.0 # Using a stable v5 release
    container_name: ai_engine_graph
    ports:
      - "7474:7474" # Neo4j Browser UI
      - "7687:7687" # Bolt protocol (for code connection)
    environment:
      - NEO4J_AUTH=neo4j/password123 # Set your username/password
      - NEO4J_PLUGINS=["apoc"] # Enable APOC plugin
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
  postgres:
    image: postgres:16
    container_name: ai_engine_auth_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=second_brain
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  neo4j_data:
  neo4j_logs:
  postgres_data:
